<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voting Instructions</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: black;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    .starfield,
    .starfield2 {
      position: fixed;
      inset: 0;
      z-index: -1;
      background-repeat: repeat;
    }

    .starfield {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><rect width='100%' height='100%' fill='black'/><circle cx='20' cy='40' r='1' fill='white'/><circle cx='80' cy='120' r='1' fill='white'/><circle cx='150' cy='60' r='1' fill='white'/><circle cx='200' cy='200' r='1' fill='white'/><circle cx='260' cy='80' r='1' fill='white'/><circle cx='120' cy='250' r='1' fill='white'/><circle cx='40' cy='200' r='1' fill='white'/></svg>");
      animation: starMove 120s linear infinite;
      opacity: 0.9;
    }

    .starfield2 {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><rect width='100%' height='100%' fill='black'/><circle cx='60' cy='90' r='2' fill='white'/><circle cx='300' cy='140' r='2' fill='white'/><circle cx='180' cy='300' r='2' fill='white'/><circle cx='350' cy='40' r='2' fill='white'/></svg>");
      animation: starMove 220s linear infinite;
      opacity: 0.5;
    }

    @keyframes starMove {
      from { transform: translateY(0); }
      to { transform: translateY(-1000px); }
    }

    .panel {
      background: linear-gradient(#222a3d, #0f1422);
      border: 6px solid #4c5a7a;
      border-radius: 24px;
      padding: 50px 60px 55px;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.6);
      max-width: 700px;
      width: 100%;
    }

    h1 {
      margin: 0 0 32px;
      font-size: 48px;
      letter-spacing: 3px;
    }

    ol {
      margin: 0;
      padding-left: 32px;
      line-height: 2.4;
      font-size: 24px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="starfield"></div>
  <div class="starfield2"></div>

  <div class="panel">
    <h1>VOTING INSTRUCTIONS</h1>
    <ol>
      <li>Wait till all players have returned</li>
      <li>Discuss</li>
      <li>Start voting</li>
      <li>Click vote AND click next player</li>
      <li>Next player submits vote and continues</li>
      <li>After all votes are submitted, the person who was voted out will be revealed</li>
    </ol>
  </div>
</body>
</html>
