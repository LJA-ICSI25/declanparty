<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Orbitron',sans-serif;background:black;color:white;min-height:100vh;overflow:auto;display:flex;align-items:center;justify-content:center;padding:40px 20px;box-sizing:border-box;}
.starfield,.starfield2{position:fixed;inset:0;z-index:-1;background-repeat:repeat;}
.starfield{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><rect width='100%' height='100%' fill='black'/><circle cx='20' cy='40' r='1' fill='white'/><circle cx='80' cy='120' r='1' fill='white'/><circle cx='150' cy='60' r='1' fill='white'/><circle cx='200' cy='200' r='1' fill='white'/><circle cx='260' cy='80' r='1' fill='white'/><circle cx='120' cy='250' r='1' fill='white'/><circle cx='40' cy='200' r='1' fill='white'/></svg>");animation:starMove 120s linear infinite;opacity:.9;}
.starfield2{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><rect width='100%' height='100%' fill='black'/><circle cx='60' cy='90' r='2' fill='white'/><circle cx='300' cy='140' r='2' fill='white'/><circle cx='180' cy='300' r='2' fill='white'/><circle cx='350' cy='40' r='2' fill='white'/></svg>");animation:starMove 220s linear infinite;opacity:.5;}
@keyframes starMove{from{transform:translateY(0)}to{transform:translateY(-1000px)}}
.panel{position:relative;width:100%;max-width:760px;background:linear-gradient(#222a3d,#0f1422);border:4px solid #4c5a7a;border-radius:18px;padding:30px 40px 35px;box-shadow:0 0 40px rgba(0,0,0,.6);text-align:center;}
h1{margin:0;font-size:32px;letter-spacing:2px}
.subtitle{opacity:.7;margin-bottom:20px;font-size:14px}
.players{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:100%}
.player{width:calc((100% - 30px) / 4);min-width:0;box-sizing:border-box;border-radius:14px;padding:16px;border:3px solid rgba(255,255,255,.25);cursor:pointer;transition:.18s ease;font-size:18px;}
.player:hover{transform:scale(1.06);border-color:white;box-shadow:0 0 12px rgba(255,255,255,.5)}
.player.selected{outline:4px solid rgba(255,255,255,.65);transform:scale(1.04)}
.voteBtn{margin:10px;padding:14px 26px;font-family:inherit;font-size:16px;border-radius:12px;border:3px solid #7e8bb3;background:linear-gradient(#3d4a6b,#1a2135);color:white;cursor:pointer;}
.voteBtn:hover{transform:scale(1.05);box-shadow:0 0 14px rgba(255,255,255,.4);border-color:white}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;}
.popup{background:linear-gradient(#2b344d,#101726);border:4px solid #7e8bb3;border-radius:18px;padding:40px 50px;text-align:center;font-size:22px;box-shadow:0 0 30px rgba(0,0,0,.7);}
.ejection{position:fixed;inset:0;background:black;color:white;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:42px;letter-spacing:2px;text-align:center;z-index:2000;}
.ejection span{margin-top:20px;font-size:26px;opacity:.8}
</style>
</head>
<body>
<div class="starfield"></div>
<div class="starfield2"></div>

<div class="panel" id="setupPanel">
  <h1>PLAYER SETUP</h1>
  <div class="subtitle">Add, remove, or edit players. Click player to select as Imposter</div>
  <form id="addPlayerForm" style="margin-bottom:18px;display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;">
    <input id="playerNameInput" type="text" placeholder="Name" maxlength="12" style="padding:8px 10px;border-radius:8px;border:1px solid #888;font-size:16px;width:120px;">
    <input id="playerColorInput" type="color" value="#C51111" style="width:40px;height:40px;border:none;">
    <button type="submit" class="voteBtn" style="margin:0;">Add Player</button>
  </form>
  <div class="players" id="setupPlayers"></div>
  <button class="voteBtn" onclick="confirmImposters()">CONFIRM</button>
</div>

<div id="noMeetingOverlay" style="display:none;position:fixed;inset:0;z-index:3000;background:#117F2D;color:white;align-items:center;justify-content:center;flex-direction:column;font-family:'Orbitron',sans-serif;font-size:3vw;text-align:center;">
  <div style="margin-bottom:40px;font-size:6vw;font-weight:bold;letter-spacing:2px;">NO MEETING YET</div>
  <button id="closeNoMeetingBtn" class="voteBtn">Close</button>
</div>

<div class="panel" id="mainPanel" style="display:none;">
  <h1>ADMIN DASHBOARD</h1>
  <div class="subtitle">Pick who to vote out or eliminate</div>
  <div class="players" id="players"></div>
  <div id="currentPick" style="margin:12px 0;font-size:18px;opacity:0.9"></div>
  <button class="voteBtn" onclick="endVoting()">EJECT</button>
  <button class="voteBtn" id="skipBtn" style="margin-left:12px;">Skip</button>
  <button class="voteBtn" id="toggleAdminBtn" style="margin-left:12px;">Show Admin Controls</button>
  <div id="adminControls" style="display:none;margin-top:18px;">
    <button class="voteBtn" id="emergencyBtn">EMERGENCY MEETING</button>
    <button class="voteBtn" id="noMeetingBtn" style="background:linear-gradient(#117F2D,#0a4d1a);border-color:#7eb37e;">NO MEETING YET</button>
    <button class="voteBtn" style="background:linear-gradient(#6b3d3d,#351a1a);border-color:#b37e7e;" onclick="killPlayer()">KILL PLAYER</button>
    <button class="voteBtn" id="showImpostersBtn" style="background:linear-gradient(#4a3d6b,#1a1535);border-color:#8b7eb3;">View Imposters</button>
    <div style="margin-top:18px;text-align:left;max-width:400px;margin-left:auto;margin-right:auto;">
      <h3 style="margin-bottom:6px;font-size:20px;">Ejection Log</h3>
      <ul id="ejectionLog" style="background:#181c2a;padding:12px 18px;border-radius:10px;min-height:40px;"></ul>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button class="voteBtn" id="undoEjectBtn">Undo Last Ejection</button>
        <button class="voteBtn" onclick="clearEjectionLog()">Clear Ejection Log</button>
      </div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:12px;">
        <button class="voteBtn" onclick="showGameOver('CREWMATES WIN','#0a0','All imposters have been eliminated')" style="background:linear-gradient(#0a4d1a,#052610);border-color:#5eb35e;">Crewmates Win</button>
        <button class="voteBtn" onclick="showGameOver('IMPOSTERS WIN','#c00','Imposters have taken control of the ship')" style="background:linear-gradient(#6b1a1a,#351010);border-color:#b35e5e;">Imposters Win</button>
      </div>
      <button class="voteBtn" id="resetGameBtn" style="display:block;margin:12px auto 0 auto;background:linear-gradient(#3d6b4a,#1a3521);border-color:#7eb37e;">Reset Game</button>
    </div>
  </div>
</div>

<div id="emergencyOverlay" style="display:none;position:fixed;inset:0;z-index:3000;background:#C51111;color:white;align-items:center;justify-content:center;flex-direction:column;font-family:'Orbitron',sans-serif;font-size:3vw;text-align:center;">
  <div style="margin-bottom:40px;font-size:6vw;font-weight:bold;">EMERGENCY MEETING</div>
  <button id="startMeetingBtn" class="voteBtn">Start Meeting</button>
</div>

<script>
const ADMIN_PASSWORD="CyberKeco25?!";

function getEjectionLog(){ return JSON.parse(localStorage.getItem('ejectionLog')||'[]'); }
function saveEjectionLog(log){ localStorage.setItem('ejectionLog',JSON.stringify(log)); }
function addEjectionToLog(name){ const log=getEjectionLog(); log.push({name,time:new Date().toLocaleTimeString()}); saveEjectionLog(log); renderEjectionLog(); }
function renderEjectionLog(){ const ul=document.getElementById('ejectionLog'); ul.innerHTML=getEjectionLog().length?getEjectionLog().map(e=>`<li>${e.name} <span style='font-size:12px;opacity:0.7'>(${e.time})</span></li>`).join(''):'<li style="opacity:.6">No ejections yet.</li>'; }
function undoLastEjection(){ let log=getEjectionLog(); if(!log.length)return; const last=log.pop(); saveEjectionLog(log); document.querySelectorAll("#players .player").forEach(card=>{ if(card.innerText.trim()===last.name){ card.style.textDecoration="none"; card.style.opacity="1"; card.style.filter="none"; card.style.pointerEvents="auto"; } }); renderEjectionLog(); }
function clearEjectionLog(){ localStorage.removeItem('ejectionLog'); renderEjectionLog(); }
function resetGame(){ localStorage.removeItem('ejectionLog'); localStorage.removeItem('imposters'); location.reload(); }

document.getElementById('toggleAdminBtn').onclick=function(){
  const panel=document.getElementById('adminControls');
  const btn=document.getElementById('toggleAdminBtn');
  panel.style.display=panel.style.display==='none'?'block':'none';
  btn.innerText=panel.style.display==='block'?'Hide Admin Controls':'Show Admin Controls';
};

document.getElementById('showImpostersBtn').onclick=function(){
  const pw=prompt("Enter admin password:");
  if(pw===ADMIN_PASSWORD){ const imposters=JSON.parse(localStorage.getItem("imposters")||"[]"); alert(imposters.length?`Imposters: ${imposters.join(", ")}`:"No imposters set."); }
  else if(pw!==null) alert("Incorrect password.");
};

document.getElementById('undoEjectBtn').onclick=undoLastEjection;
document.getElementById('resetGameBtn').onclick=resetGame;
renderEjectionLog();

const DEFAULT_PLAYERS=[{name:"Tori",color:"#C51111"},{name:"Emmy",color:"#132FD2"},{name:"Julian",color:"#117F2D"},{name:"Brayden",color:"#D4A017"},{name:"Addy",color:"#EA580C"},{name:"krysthel",color:"#6B2FBC"},{name:"Margaret",color:"#71491E"},{name:"Sevastian",color:"#0D9488"},{name:"Thalia",color:"#EC0E63"},{name:"Carina",color:"#7C3AED"},{name:"Maytte",color:"#0EA5E9"},{name:"Dilyah",color:"#16A34A"},{name:"Ava u",color:"#E55B8C"},{name:"Soleil",color:"#D97706"},{name:"Ava p",color:"#8B5CF6"},{name:"Elijah",color:"#0891B2"},{name:"Azzy",color:"#DB2777"},{name:"Lisa",color:"#059669"},{name:"Harry",color:"#B45309"},{name:"Isla",color:"#6366F1"},{name:"Declan",color:"#65A30D"},{name:"Lunden",color:"#BE185D"},{name:"Arion",color:"#0F766E"}];
let players=[...DEFAULT_PLAYERS];
let chosenImposters=[];
const setupContainer=document.getElementById("setupPlayers");

async function loadPlayersFromServer(){ try{ const res=await fetch("/players"); const data=await res.json(); if(Array.isArray(data)&&data.length>0){ players=data; return true; } }catch(e){} return false; }
async function savePlayersToServer(){ try{ await fetch("/players",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({players})}); }catch(e){} }

function renderSetupPlayers(){
  setupContainer.innerHTML='';
  players.forEach((p,idx)=>{
    const div=document.createElement("div"); div.className="player"; div.style.background=p.color; div.innerText=p.name;
    div.onclick=()=>{ if(div.classList.contains("selected")){ div.classList.remove("selected"); chosenImposters=chosenImposters.filter(x=>x!==p.name); } else { if(chosenImposters.length>=3)return; div.classList.add("selected"); chosenImposters.push(p.name); } };
    const removeBtn=document.createElement('button'); removeBtn.innerText='✕'; removeBtn.title='Remove Player';
    removeBtn.style.cssText="margin-left:8px;background:#222;color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;";
    removeBtn.onclick=async(e)=>{ e.stopPropagation(); players.splice(idx,1); await savePlayersToServer(); renderSetupPlayers(); };
    div.appendChild(removeBtn); setupContainer.appendChild(div);
  });
}

async function initPlayers(){ await loadPlayersFromServer(); renderSetupPlayers(); renderVotingPlayers(); }
initPlayers();

document.getElementById('addPlayerForm').onsubmit=async function(e){
  e.preventDefault();
  const nameInput=document.getElementById('playerNameInput');
  const colorInput=document.getElementById('playerColorInput');
  const name=nameInput.value.trim();
  if(!name)return;
  if(players.find(p=>p.name===name)){ alert("Player already exists."); return; }
  players.push({name,color:colorInput.value});
  await savePlayersToServer();
  renderSetupPlayers(); renderVotingPlayers();
  nameInput.value=""; nameInput.focus();
};

function confirmImposters(){ localStorage.setItem("imposters",JSON.stringify(chosenImposters)); document.getElementById("setupPanel").style.display="none"; document.getElementById("mainPanel").style.display="block";}

document.getElementById('emergencyBtn').onclick=()=>{ document.getElementById("emergencyOverlay").style.display="flex"; document.getElementById("mainPanel").style.display="none"; };
document.getElementById('startMeetingBtn').onclick=()=>{ document.getElementById("emergencyOverlay").style.display="none"; document.getElementById("mainPanel").style.display="block"; };
document.getElementById('noMeetingBtn').onclick=()=>{ document.getElementById("noMeetingOverlay").style.display="flex"; document.getElementById("mainPanel").style.display="none"; };
document.getElementById('closeNoMeetingBtn').onclick=()=>{ document.getElementById("noMeetingOverlay").style.display="none"; document.getElementById("mainPanel").style.display="block"; };

const container=document.getElementById("players");
let picked=null;

function renderVotingPlayers(){ container.innerHTML=''; players.forEach(p=>{ const div=document.createElement("div"); div.className="player"; div.style.background=p.color; div.innerText=p.name; div.onclick=()=>selectPlayer(p.name,div); container.appendChild(div); }); }
function selectPlayer(name,el){ picked=name; document.querySelectorAll('#players .player').forEach(c=>c.classList.remove('selected')); el.classList.add('selected'); const cp=document.getElementById('currentPick'); if(cp)cp.innerText=`Selected: ${name}`; }

async function killPlayer(){
  const input=prompt("Enter player name(s) to kill, separated by commas:");
  if(!input)return;
  const namesToKill=input.split(',').map(n=>n.trim());
  let killedAny=false; let feedbackNames=[];
  for(const name of namesToKill){
    if(!players.find(p=>p.name===name))continue;
    const cards=document.querySelectorAll("#players .player");
    let target=null; cards.forEach(d=>{ if(d.innerText.trim()===name)target=d; });
    if(target&&target.style.opacity!=="0.45"){ crossOutPlayer(name); feedbackNames.push(name); killedAny=true;
      try{ await fetch("/kill",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name})}); }catch(e){}
      let imposters=JSON.parse(localStorage.getItem("imposters")||"[]");
      if(imposters.includes(name)){ imposters=imposters.filter(x=>x!==name); localStorage.setItem("imposters",JSON.stringify(imposters)); }
    }
  }
  if(killedAny){ const screen=document.createElement("div"); screen.className="ejection"; screen.style.backgroundColor="rgba(50,0,0,0.9)";
    screen.innerHTML=`<div id="killText"></div><button class="voteBtn" style="margin-top:40px" id="closeKillBtn">CONTINUE</button>`; document.body.appendChild(screen);
    typeWriter(document.getElementById("killText"),`${feedbackNames.join(", ")} ${feedbackNames.length>1?"WERE":"WAS"} ELIMINATED.`,45);
    document.getElementById("closeKillBtn").onclick=()=>screen.remove();
  } else alert("No valid or living players were named.");
}

function endVoting(){
  const screen=document.createElement("div"); screen.className="ejection";
  screen.innerHTML=`<div id="ejectText"></div><button class="voteBtn" style="margin-top:40px" id="endMeetingBtn">CONTINUE</button>`;
  document.body.appendChild(screen);
  const textEl=document.getElementById("ejectText");
  const winner=picked;
  if(!winner) typeWriter(textEl,"No one was ejected.",45);
  else { typeWriter(textEl,`${winner} was voted out.`,45); crossOutPlayer(String(winner).trim()); }
  document.getElementById("endMeetingBtn").onclick=()=>{ screen.remove(); picked=null; const cp=document.getElementById('currentPick'); if(cp)cp.innerText=''; document.querySelectorAll('#players .player').forEach(c=>c.classList.remove('selected')); };
}

document.getElementById("skipBtn").onclick=function(){
  const screen=document.createElement("div"); screen.className="ejection";
  screen.innerHTML=`<div id="skipText"></div><button class="voteBtn" style="margin-top:40px" id="skipCloseBtn">CONTINUE</button>`;
  document.body.appendChild(screen);
  typeWriter(document.getElementById("skipText"),"No one was ejected (Skipped).",45);
  document.getElementById("skipCloseBtn").onclick=()=>{ screen.remove(); picked=null; const cp=document.getElementById('currentPick'); if(cp)cp.innerText=''; document.querySelectorAll('#players .player').forEach(c=>c.classList.remove('selected')); };
};

function showGameOver(title,bgColor,subtext){
  const win=document.createElement("div"); win.className="ejection"; win.style.background=bgColor;
  win.innerHTML=`<div style="font-size:50px;font-weight:700">${title}</div><span style="font-size:26px;opacity:0.9">${subtext}</span><button class="voteBtn" style="margin-top:40px" onclick="location.reload()">PLAY AGAIN</button>`;
  document.body.appendChild(win);
}

function applyKilledFromServer(){ fetch("/killed").then(r=>r.json()).then(data=>{ document.querySelectorAll("#players .player").forEach(card=>{ const name=card.innerText.trim(); if(data[name]){ card.style.textDecoration="line-through"; card.style.opacity="0.45"; card.style.filter="grayscale(70%)"; card.style.pointerEvents="none"; } }); }).catch(()=>{}); }
setInterval(applyKilledFromServer,1500);

function crossOutPlayer(name){
  document.querySelectorAll("#players .player").forEach(card=>{
    if(card.innerText.trim()===name){ card.style.textDecoration="line-through"; card.style.opacity="0.45"; card.style.filter="grayscale(70%)"; card.style.pointerEvents="none"; addEjectionToLog(name); }
  });
}

function typeWriter(el,text,speed=40){ el.textContent=""; let i=0; function t(){ if(i<text.length){ el.textContent+=text.charAt(i); i++; setTimeout(t,speed); } } t(); }
</script>
</body>
</html>
